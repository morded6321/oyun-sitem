<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>3 Şerit Kaçış - Lane Runner</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    body {
      background: linear-gradient(180deg, #0a0a0f 0%, #15152a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      font-family: 'Rajdhani', sans-serif;
      color: #eee;
      overflow-x: hidden;
      padding: 8px;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .title-bar {
      text-align: center;
      margin-bottom: 6px;
      flex-shrink: 0;
    }
    .title-bar h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1rem, 4.5vw, 1.6rem);
      color: #ffd93d;
    }
    .title-bar p {
      font-size: clamp(0.65rem, 2.5vw, 0.8rem);
      color: #8abeb7;
      margin-top: 2px;
    }
    .game-wrap {
      position: relative;
      max-width: min(420px, 100vw - 16px);
      width: 100%;
    }
    #gameCanvas {
      display: block;
      width: 100%;
      height: auto;
      max-height: calc(100vh - 80px);
      max-height: calc(100dvh - 80px);
      background: #0d0d0d;
      border: 3px solid #34495e;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05), inset 0 1px 0 rgba(255,255,255,0.04);
      aspect-ratio: 420 / 640;
    }
    .touch-controls {
      display: none;
      position: fixed;
      bottom: max(12px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      gap: 8px;
      padding: 8px;
      pointer-events: none;
    }
    .touch-controls.show { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; pointer-events: auto; }
    .touch-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid rgba(255,217,61,0.6);
      background: rgba(0,0,0,0.5);
      color: #ffd93d;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .touch-btn:active { background: rgba(255,217,61,0.25); }
    .touch-btn.wide { width: 70px; border-radius: 12px; }
    .touch-btn.enter-btn { width: 100%; max-width: 200px; border-radius: 12px; font-size: 16px; order: -1; margin-bottom: 4px; }
    body.touch-device .game-wrap { padding-bottom: 72px; }
  </style>
</head>
<body>
  <div class="title-bar">
    <h1>3 ŞERİT KAÇIŞ</h1>
    <p class="desktop-hint">← → Şerit · ↑↓ Hız · P Duraklat · R Yeniden</p>
    <p class="touch-hint" style="display:none;">Parmakla sağa/sola kaydır · Hız için + −</p>
  </div>
  <div class="game-wrap">
    <canvas id="gameCanvas" width="420" height="640"></canvas>
  </div>
  <div class="touch-controls" id="touchControls">
    <button type="button" class="touch-btn enter-btn" id="btnEnter" aria-label="Enter">ENTER</button>
    <button type="button" class="touch-btn" id="btnLeft" aria-label="Sol">SOL</button>
    <button type="button" class="touch-btn" id="btnSpeedDown" aria-label="Yavaşla">−</button>
    <button type="button" class="touch-btn wide" id="btnPause" aria-label="Duraklat">P</button>
    <button type="button" class="touch-btn" id="btnSpeedUp" aria-label="Hızlan">+</button>
    <button type="button" class="touch-btn" id="btnRight" aria-label="Sağ">SAĞ</button>
    <button type="button" class="touch-btn" id="btnRestart" aria-label="Yeniden başlat">R</button>
  </div>

  <script>
    /**
     * 3 ŞERİT KAÇIŞ - Lane Runner
     * 3 şeritli yolda düz ilerle; sol/sağ ile tek şerit kay; öndeki araçlardan kaç.
     * Kontroller: <- 1 şerit sol, -> 1 şerit sağ, ^ hızlan, v yavaşla.
     */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const CW = canvas.width;
    const CH = canvas.height;

    const STATE = { MENU: 0, COUNTDOWN: 1, PLAYING: 2, PAUSED: 3, GAME_OVER: 4, LEVEL_COMPLETE: 5, STATS: 6, HELP: 7 };
    let gameState = STATE.MENU;

    const LEVELS = [
      { name: 'Şehir Çıkışı', targetScore: 450, desc: 'Hedef puana ulaş', difficultyStart: 0, theme: 'day' },
      { name: 'Otoyol', targetScore: 900, desc: 'Daha hızlı trafik', difficultyStart: 2, theme: 'day' },
      { name: 'Gece Sürüşü', targetScore: 1400, desc: 'Gece yolu', difficultyStart: 4, theme: 'mixed' },
      { name: 'Yoğun Trafik', targetScore: 2000, desc: 'Daha sık araçlar', difficultyStart: 6, theme: 'night' },
      { name: 'Son Durak', targetScore: 2800, desc: 'Maksimum zorluk', difficultyStart: 8, theme: 'night' }
    ];
    let currentLevel = 1;
    let levelTargetScore = LEVELS[0].targetScore;
    let levelStartRoadOffset = 0;
    let unlockedLevel = Math.max(1, parseInt(localStorage.getItem('laneRunnerUnlocked') || '1'));
    let menuSelectedLevel = 0;
    let countdown = 4;
    let countdownTimer = 0;
    let highScore = parseInt(localStorage.getItem('laneRunnerHigh') || '0');
    let screenShake = 0;
    let roadOffset = 0;
    let spawnTimer = 0;
    let difficultyLevel = 0;
    let totalGames = parseInt(localStorage.getItem('laneRunnerGames') || '0');
    let nearMissCount = 0;
    let nearMissFlash = 0;
    const particles = [];
    const floatingTexts = [];
    let audioCtx = null;
    let soundOn = localStorage.getItem('laneRunnerSound') !== 'false';
    let lastRunScore = 0;
    let lastRunNearMiss = 0;
    let wasNewRecord = false;

    const LANE_COUNT = 3;
    const LANE_WIDTH = CW / LANE_COUNT;
    const LANE_CENTERS = [
      LANE_WIDTH / 2,
      LANE_WIDTH + LANE_WIDTH / 2,
      LANE_WIDTH * 2 + LANE_WIDTH / 2
    ];

    const PLAYER_WIDTH = 46;
    const PLAYER_HEIGHT = 88;
    const TRAFFIC_WIDTH = 44;
    const TRAFFIC_HEIGHT = 82;
    const TRUCK_WIDTH = 48;
    const TRUCK_HEIGHT = 100;
    const PLAYER_Y = CH - 115;
    const MIN_SPEED = 70 / 22;
    const MAX_SPEED = 18;
    const ACCEL = 0.07;
    const DECEL = 0.05;
    const COLLISION_MARGIN = 18;
    const LANE_CHANGE_SPEED = 0.14;
    const BASE_SPAWN_GAP = 62;
    const MIN_SPAWN_GAP = 32;
    const MIN_VERTICAL_GAP = 88;
    const SPAWN_Y_OFFSET = -100;

    const player = {
      lane: 1,
      x: LANE_CENTERS[1],
      targetX: LANE_CENTERS[1],
      speed: 5.5,
      score: 0,
      gameOver: false,
      invincibleFrames: 0
    };

    const traffic = [];
    const NEAR_MISS_BONUS = 50;
    const decorations = [];
    let lastDecorationY = 0;
    const DAY_NIGHT_CYCLE = 2600;
    const BRIDGES = [
      { start: 500, end: 920 },
      { start: 1800, end: 2220 },
      { start: 3800, end: 4180 },
      { start: 5800, end: 6180 },
      { start: 7800, end: 8180 }
    ];
    let isNight = false;

    let keys = {};
    let keyProcessed = { ArrowLeft: false, ArrowRight: false };
    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (!e.repeat && gameState === STATE.PLAYING && !player.gameOver) {
        if (e.key === 'ArrowLeft' && player.lane > 0) {
          player.lane--;
          player.targetX = LANE_CENTERS[player.lane];
          keyProcessed.ArrowLeft = true;
          playLaneChange();
        }
        if (e.key === 'ArrowRight' && player.lane < 2) {
          player.lane++;
          player.targetX = LANE_CENTERS[player.lane];
          keyProcessed.ArrowRight = true;
          playLaneChange();
        }
      }
      if (e.key === 'p' || e.key === 'P') {
        if (gameState === STATE.PLAYING) gameState = STATE.PAUSED;
        else if (gameState === STATE.PAUSED) gameState = STATE.PLAYING;
        e.preventDefault();
      }
      if ((e.key === 'r' || e.key === 'R') && gameState === STATE.GAME_OVER) {
        resetGame();
        e.preventDefault();
      }
      if (gameState === STATE.LEVEL_COMPLETE) {
        if (e.key === 'Enter' || e.key === ' ') {
          if (currentLevel < LEVELS.length && currentLevel + 1 <= unlockedLevel) {
            startGame(currentLevel + 1);
            resetGame();
          } else {
            gameState = STATE.MENU;
          }
          e.preventDefault();
        }
        if (e.key === 'Escape' || e.key === 'Backspace') {
          gameState = STATE.MENU;
          e.preventDefault();
        }
      }
      if (gameState === STATE.MENU) {
        if (e.key === 'ArrowUp' && menuSelectedLevel > 0) { menuSelectedLevel--; e.preventDefault(); }
        if (e.key === 'ArrowDown' && menuSelectedLevel < LEVELS.length - 1) { menuSelectedLevel++; e.preventDefault(); }
        if (e.key === ' ' || e.key === 'Enter') {
          if (menuSelectedLevel + 1 <= unlockedLevel) { startGame(menuSelectedLevel + 1); resetGame(); }
          e.preventDefault();
        }
        if (e.key === 's' || e.key === 'S') { gameState = STATE.STATS; e.preventDefault(); }
        if (e.key === 'h' || e.key === 'H' || e.key === '?') { gameState = STATE.HELP; e.preventDefault(); }
      }
      if ((gameState === STATE.STATS || gameState === STATE.HELP) && (e.key === 'Escape' || e.key === 'Backspace')) {
        gameState = STATE.MENU;
        e.preventDefault();
      }
      e.preventDefault();
    });
    document.addEventListener('keyup', e => {
      keys[e.key] = false;
      keyProcessed.ArrowLeft = false;
      keyProcessed.ArrowRight = false;
    });

    const hasTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    if (hasTouch) {
      document.body.classList.add('touch-device');
      document.querySelector('.desktop-hint').style.display = 'none';
      document.querySelector('.touch-hint').style.display = 'block';
      document.getElementById('touchControls').classList.add('show');
    }

    let swipeStartX = null;
    let swipeTouchId = null;
    const SWIPE_THRESHOLD = 40;

    canvas.addEventListener('touchstart', e => {
      if (e.changedTouches.length === 0) return;
      const t = e.changedTouches[0];
      swipeStartX = t.clientX;
      swipeTouchId = t.identifier;
    }, { passive: true });

    canvas.addEventListener('touchmove', e => {
      if (gameState === STATE.PLAYING) e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      if (e.changedTouches.length === 0 || swipeStartX === null) return;
      const t = Array.from(e.changedTouches).find(tc => tc.identifier === swipeTouchId);
      if (!t) return;
      const deltaX = t.clientX - swipeStartX;
      if (gameState === STATE.PLAYING && !player.gameOver) {
        if (deltaX < -SWIPE_THRESHOLD && player.lane > 0) {
          player.lane--;
          player.targetX = LANE_CENTERS[player.lane];
          playLaneChange();
        } else if (deltaX > SWIPE_THRESHOLD && player.lane < 2) {
          player.lane++;
          player.targetX = LANE_CENTERS[player.lane];
          playLaneChange();
        }
      }
      swipeStartX = null;
      swipeTouchId = null;
    }, { passive: true });
    canvas.addEventListener('contextmenu', e => e.preventDefault());

    function bindTouchBtn(id, onDown, onUp) {
      const el = document.getElementById(id);
      el.addEventListener('touchstart', e => { e.preventDefault(); onDown(); });
      el.addEventListener('touchend', e => { e.preventDefault(); if (onUp) onUp(); });
      el.addEventListener('mousedown', e => { e.preventDefault(); onDown(); });
      el.addEventListener('mouseup', e => { if (onUp) onUp(); });
      el.addEventListener('mouseleave', e => { if (onUp) onUp(); });
    }
    bindTouchBtn('btnLeft', () => { keys['ArrowLeft'] = true; doLaneLeft(); }, () => { keys['ArrowLeft'] = false; });
    bindTouchBtn('btnRight', () => { keys['ArrowRight'] = true; doLaneRight(); }, () => { keys['ArrowRight'] = false; });
    bindTouchBtn('btnSpeedUp', () => { keys['ArrowUp'] = true; }, () => { keys['ArrowUp'] = false; });
    bindTouchBtn('btnSpeedDown', () => { keys['ArrowDown'] = true; }, () => { keys['ArrowDown'] = false; });
    document.getElementById('btnPause').addEventListener('click', togglePause);
    document.getElementById('btnPause').addEventListener('touchend', e => { e.preventDefault(); togglePause(); });
    document.getElementById('btnEnter').addEventListener('click', doEnter);
    document.getElementById('btnEnter').addEventListener('touchend', e => { e.preventDefault(); doEnter(); });
    document.getElementById('btnRestart').addEventListener('click', doRestart);
    document.getElementById('btnRestart').addEventListener('touchend', e => { e.preventDefault(); doRestart(); });

    function doRestart() {
      if (gameState === STATE.GAME_OVER) {
        resetGame();
      }
    }

    function doLaneLeft() {
      if (gameState !== STATE.PLAYING || player.gameOver || player.lane <= 0) return;
      player.lane--;
      player.targetX = LANE_CENTERS[player.lane];
      playLaneChange();
    }
    function doLaneRight() {
      if (gameState !== STATE.PLAYING || player.gameOver || player.lane >= 2) return;
      player.lane++;
      player.targetX = LANE_CENTERS[player.lane];
      playLaneChange();
    }
    function togglePause() {
      if (gameState === STATE.PLAYING) gameState = STATE.PAUSED;
      else if (gameState === STATE.PAUSED) gameState = STATE.PLAYING;
    }
    function doEnter() {
      if (gameState === STATE.LEVEL_COMPLETE) {
        if (currentLevel < LEVELS.length && currentLevel + 1 <= unlockedLevel) {
          startGame(currentLevel + 1);
          resetGame();
        } else {
          gameState = STATE.MENU;
        }
        return;
      }
      if (gameState === STATE.MENU && menuSelectedLevel + 1 <= unlockedLevel) {
        startGame(menuSelectedLevel + 1);
        resetGame();
      }
    }

    function initAudio() {
      if (audioCtx) return;
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    function playTone(freq, duration, type, vol) {
      if (!soundOn || !audioCtx) return;
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        osc.type = type || 'square';
        gain.gain.setValueAtTime(vol || 0.06, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }
    function playLaneChange() { playTone(200, 0.04, 'sine'); playTone(280, 0.03, 'sine'); }
    function playNearMiss() { playTone(600, 0.06, 'sine'); playTone(900, 0.05, 'sine'); }
    function playCrash() { playTone(120, 0.25, 'sawtooth'); playTone(60, 0.3, 'sawtooth'); }
    function playCountdownBeep() { playTone(400, 0.08, 'sine'); }
    function playGo() { playTone(523, 0.1, 'sine'); playTone(659, 0.12, 'sine'); playTone(784, 0.15, 'sine'); }

    function startGame(levelNum) {
      levelNum = levelNum || 1;
      if (levelNum < 1 || levelNum > LEVELS.length || levelNum > unlockedLevel) return;
      currentLevel = levelNum;
      levelTargetScore = LEVELS[currentLevel - 1].targetScore;
      levelStartRoadOffset = LEVELS[currentLevel - 1].difficultyStart * 500;
      initAudio();
      gameState = STATE.COUNTDOWN;
      countdown = 4;
      countdownTimer = 0;
      totalGames++;
      localStorage.setItem('laneRunnerGames', String(totalGames));
    }

    function getLaneFromX(x) {
      if (x < LANE_WIDTH) return 0;
      if (x < LANE_WIDTH * 2) return 1;
      return 2;
    }

    function resetGame() {
      player.lane = 1;
      player.x = LANE_CENTERS[1];
      player.targetX = LANE_CENTERS[1];
      player.speed = 6;
      player.score = 0;
      player.gameOver = false;
      player.invincibleFrames = 0;
      traffic.length = 0;
      roadOffset = levelStartRoadOffset;
      spawnTimer = 0;
      difficultyLevel = LEVELS[currentLevel - 1].difficultyStart;
      screenShake = 0;
      nearMissCount = 0;
      nearMissFlash = 0;
      particles.length = 0;
      floatingTexts.length = 0;
      decorations.length = 0;
      lastDecorationY = roadOffset;
      gameState = STATE.COUNTDOWN;
      countdown = 4;
      countdownTimer = 0;
    }

    function updatePlayer() {
      if (player.gameOver || gameState !== STATE.PLAYING) return;

      if (player.invincibleFrames > 0) player.invincibleFrames--;

      if (keys['ArrowUp']) player.speed = Math.min(MAX_SPEED, player.speed + ACCEL);
      if (keys['ArrowDown']) player.speed = Math.max(MIN_SPEED, player.speed - DECEL);

      player.x += (player.targetX - player.x) * LANE_CHANGE_SPEED;
      roadOffset += player.speed;
      player.score = Math.floor((roadOffset - levelStartRoadOffset) / 8);
      difficultyLevel = LEVELS[currentLevel - 1].difficultyStart + Math.floor((roadOffset - levelStartRoadOffset) / 500);

      if (player.score >= levelTargetScore) {
        gameState = STATE.LEVEL_COMPLETE;
        lastRunScore = player.score;
        lastRunNearMiss = nearMissCount;
        if (currentLevel >= unlockedLevel && currentLevel < LEVELS.length) {
          unlockedLevel = currentLevel + 1;
          localStorage.setItem('laneRunnerUnlocked', String(unlockedLevel));
        }
        playTone(523, 0.08, 'sine');
        playTone(659, 0.1, 'sine');
        playTone(784, 0.12, 'sine');
        playTone(1047, 0.2, 'sine');
      }
    }

    function getOccupiedLanesInBand(yCenter, bandHeight) {
      const occupied = new Set();
      const top = yCenter - bandHeight / 2;
      const bottom = yCenter + bandHeight / 2;
      traffic.forEach(t => {
        const tTop = t.y - t.h / 2;
        const tBottom = t.y + t.h / 2;
        if (tBottom > top && tTop < bottom) occupied.add(t.lane);
      });
      return occupied;
    }

    function spawnTraffic() {
      if (gameState !== STATE.PLAYING || player.gameOver) return;
      spawnTimer--;
      if (spawnTimer > 0) return;

      const difficulty = Math.min(12, difficultyLevel);
      const gap = Math.max(MIN_SPAWN_GAP, BASE_SPAWN_GAP - player.speed * 1.6 - difficulty * 2.5);
      spawnTimer = gap + Math.floor(Math.random() * 22);

      const isTruck = difficulty > 2 && Math.random() < 0.24;
      const w = isTruck ? TRUCK_WIDTH : TRAFFIC_WIDTH;
      const h = isTruck ? TRUCK_HEIGHT : TRAFFIC_HEIGHT;
      const spawnY = SPAWN_Y_OFFSET - h - Math.random() * 45;
      if (traffic.length > 0) {
        const nearestCarTop = Math.min(...traffic.map(t => t.y - t.h / 2));
        if (spawnY + h / 2 > nearestCarTop - MIN_VERTICAL_GAP) return;
      }
      const bandHeight = h * 1.8;
      const occupiedInBand = getOccupiedLanesInBand(spawnY, bandHeight);

      let count = 1;
      if (difficulty > 3 && Math.random() < 0.32 && occupiedInBand.size < 2) {
        count = 2;
      }

      const lanesUsed = [];
      const colors = ['#1a5276', '#922b21', '#1e8449', '#6c3483', '#b9770e', '#1c2833', '#7f8c8d'];
      for (let c = 0; c < count; c++) {
        let lane;
        let attempts = 0;
        do {
          lane = Math.floor(Math.random() * 3);
          attempts++;
          if (attempts > 20) break;
        } while (lanesUsed.includes(lane));

        if (count === 2 && c === 1) {
          const freeLane = [0, 1, 2].find(l => !lanesUsed.includes(l) && l !== lane);
          if (freeLane !== undefined && occupiedInBand.has(freeLane)) break;
        }
        lanesUsed.push(lane);

        traffic.push({
          lane,
          x: LANE_CENTERS[lane],
          y: spawnY,
          w, h,
          color: colors[Math.floor(Math.random() * colors.length)],
          isTruck
        });
      }
    }

    function updateTraffic() {
      for (let i = traffic.length - 1; i >= 0; i--) {
        const t = traffic[i];
        t.y += player.speed;
        if (t.y > CH + 120) traffic.splice(i, 1);
      }
    }

    function addParticle(x, y, vx, vy, color, size, life) {
      particles.push({ x, y, vx, vy, color, size, life, decay: 0.015 + Math.random() * 0.02 });
    }

    function addCrashParticles(px, py) {
      for (let i = 0; i < 35; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = 2 + Math.random() * 6;
        addParticle(px, py, Math.cos(a) * s, Math.sin(a) * s - 2, '#e74c3c', 4 + Math.random() * 6, 1);
      }
      for (let i = 0; i < 15; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = 1 + Math.random() * 4;
        addParticle(px, py, Math.cos(a) * s, Math.sin(a) * s, '#2c3e50', 3 + Math.random() * 4, 1);
      }
    }

    function addFloatingText(x, y, text, color) {
      floatingTexts.push({ x, y, text, color, life: 1, vy: -1.2 });
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.08;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function updateFloatingTexts() {
      for (let i = floatingTexts.length - 1; i >= 0; i--) {
        const f = floatingTexts[i];
        f.y += f.vy;
        f.life -= 0.018;
        if (f.life <= 0) floatingTexts.splice(i, 1);
      }
    }

    function checkCollision() {
      if (player.invincibleFrames > 0) return;
      const py = PLAYER_Y;
      const ph = PLAYER_HEIGHT;
      const pw = PLAYER_WIDTH;
      const playerTop = py - ph/2;
      const playerBottom = py + ph/2;

      for (const t of traffic) {
        const trafficTop = t.y - t.h/2;
        const trafficBottom = t.y + t.h/2;
        const overlapY = playerTop < trafficBottom - 6 && playerBottom > trafficTop + 6;
        const overlapX = Math.abs(player.x - t.x) < (pw/2 + t.w/2) - COLLISION_MARGIN;

        if (!overlapY && playerBottom > trafficTop && playerTop < trafficBottom + 20) {
          const distX = Math.abs(player.x - t.x);
          if (distX > (pw/2 + t.w/2) - 35 && distX < (pw/2 + t.w/2) + 15) {
            nearMissCount++;
            player.score += NEAR_MISS_BONUS;
            nearMissFlash = 25;
            addFloatingText(player.x, py - 30, '+50 YAKIN KAÇIŞ!', '#27ae60');
            playNearMiss();
          }
        }

        if (overlapY && overlapX) {
          player.gameOver = true;
          gameState = STATE.GAME_OVER;
          screenShake = 30;
          addCrashParticles((player.x + t.x) / 2, (py + t.y) / 2);
          addFloatingText(player.x, py, 'ÇARPIŞMA!', '#e74c3c');
          playCrash();
          lastRunScore = player.score;
          lastRunNearMiss = nearMissCount;
          if (player.score > highScore) {
            highScore = player.score;
            localStorage.setItem('laneRunnerHigh', String(highScore));
            wasNewRecord = true;
          } else wasNewRecord = false;
          const totalNM = parseInt(localStorage.getItem('laneRunnerNearMiss') || '0');
          localStorage.setItem('laneRunnerNearMiss', String(totalNM + nearMissCount));
          return;
        }
      }
    }

    function drawRoad() {
      const theme = (gameState === STATE.PLAYING || gameState === STATE.COUNTDOWN) && currentLevel <= LEVELS.length ? LEVELS[currentLevel - 1].theme : 'mixed';
      if (theme === 'day') isNight = false;
      else if (theme === 'night') isNight = true;
      else isNight = (Math.floor(roadOffset / DAY_NIGHT_CYCLE) % 2) === 1;

      if (isNight) {
        const sky = ctx.createLinearGradient(0, 0, 0, CH);
        sky.addColorStop(0, '#0a0e27');
        sky.addColorStop(0.4, '#1a1a3e');
        sky.addColorStop(0.8, '#0d1117');
        sky.addColorStop(1, '#161b22');
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, CW, CH);
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        for (let i = 0; i < 45; i++) {
          const sx = (Math.sin(i * 1.3) * 0.5 + 0.5) * CW;
          const sy = (Math.sin(i * 0.7) * 0.5 + 0.5) * CH * 0.7;
          const r = (i % 3) + 1;
          ctx.beginPath();
          ctx.arc(sx, sy, r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.fillStyle = 'rgba(255,248,220,0.85)';
        ctx.beginPath();
        ctx.arc(CW * 0.85, 55, 22, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,248,220,0.3)';
        ctx.beginPath();
        ctx.arc(CW * 0.85, 55, 28, 0, Math.PI * 2);
        ctx.fill();
      } else {
        const sky = ctx.createLinearGradient(0, 0, 0, CH);
        sky.addColorStop(0, '#5dade2');
        sky.addColorStop(0.25, '#85c1e9');
        sky.addColorStop(0.5, '#aed6f1');
        sky.addColorStop(0.75, '#d4e6f1');
        sky.addColorStop(1, '#ebf5fb');
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, CW, CH);
        ctx.fillStyle = 'rgba(255,243,205,0.95)';
        ctx.beginPath();
        ctx.arc(CW * 0.78, 70, 45, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,236,179,0.4)';
        ctx.beginPath();
        ctx.arc(CW * 0.78, 70, 55, 0, Math.PI * 2);
        ctx.fill();
      }

      BRIDGES.forEach(br => {
        const y1 = br.start - roadOffset;
        const y2 = br.end - roadOffset;
        if (y2 < 0 || y1 > CH) return;
        const sy1 = Math.max(0, y1);
        const sy2 = Math.min(CH, y2);
        const water = ctx.createLinearGradient(0, sy1, 0, sy2);
        water.addColorStop(0, isNight ? '#0c1445' : '#1a5276');
        water.addColorStop(0.5, isNight ? '#0d1b4a' : '#2471a3');
        water.addColorStop(1, isNight ? '#0a0e27' : '#1b4f72');
        ctx.fillStyle = water;
        ctx.fillRect(0, sy1, 22, sy2 - sy1);
        ctx.fillRect(CW - 22, sy1, 22, sy2 - sy1);
        ctx.fillStyle = isNight ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.12)';
        for (let yy = sy1; yy < sy2; yy += 25) {
          ctx.fillRect(2, yy, 18, 3);
          ctx.fillRect(CW - 20, yy, 18, 3);
        }
      });

      const roadGrad = ctx.createLinearGradient(0, 0, 0, CH);
      if (isNight) {
        roadGrad.addColorStop(0, '#2c3e50');
        roadGrad.addColorStop(0.5, '#34495e');
        roadGrad.addColorStop(1, '#2c3e50');
      } else {
        roadGrad.addColorStop(0, '#4a5568');
        roadGrad.addColorStop(0.5, '#5a6578');
        roadGrad.addColorStop(1, '#4a5568');
      }
      ctx.fillStyle = roadGrad;
      ctx.fillRect(0, 0, CW, CH);

      BRIDGES.forEach(br => {
        const y1 = br.start - roadOffset;
        const y2 = br.end - roadOffset;
        if (y2 < 0 || y1 > CH) return;
        const sy1 = Math.max(0, y1);
        const sy2 = Math.min(CH, y2);
        ctx.fillStyle = '#5d6d7e';
        ctx.fillRect(18, sy1, 8, sy2 - sy1);
        ctx.fillRect(CW - 26, sy1, 8, sy2 - sy1);
        ctx.strokeStyle = '#7f8c8d';
        ctx.lineWidth = 1;
        ctx.strokeRect(18, sy1, 8, sy2 - sy1);
        ctx.strokeRect(CW - 26, sy1, 8, sy2 - sy1);
        const postOffset = (roadOffset * 0.4) % 28;
        ctx.fillStyle = '#6c7a89';
        for (let yy = sy1 - postOffset; yy < sy2 + 30; yy += 28) {
          ctx.fillRect(16, yy, 12, 6);
          ctx.fillRect(CW - 28, yy, 12, 6);
        }
      });

      for (let i = 0; i <= LANE_COUNT; i++) {
        const x = i * LANE_WIDTH;
        ctx.strokeStyle = isNight ? '#f4d03f' : '#f7dc6f';
        ctx.lineWidth = 3;
        ctx.setLineDash([18, 22]);
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, CH);
        ctx.stroke();
      }
      ctx.setLineDash([]);

      const dashOffset = (roadOffset * 0.6) % 36;
      ctx.strokeStyle = isNight ? 'rgba(255,255,255,0.85)' : 'rgba(255,255,255,0.95)';
      ctx.lineWidth = 2.5;
      for (let y = -dashOffset; y < CH + 50; y += 36) {
        ctx.beginPath();
        ctx.moveTo(CW/2 - 4, y);
        ctx.lineTo(CW/2 + 4, y);
        ctx.stroke();
      }

      ctx.fillStyle = isNight ? 'rgba(0,0,0,0.35)' : 'rgba(0,0,0,0.2)';
      ctx.fillRect(0, 0, 12, CH);
      ctx.fillRect(CW - 12, 0, 12, CH);

      const rumbleOffset = (roadOffset * 0.8) % 24;
      ctx.fillStyle = '#f4d03f';
      for (let y = -rumbleOffset; y < CH + 30; y += 24) {
        ctx.fillRect(8, y, 5, 12);
        ctx.fillRect(CW - 13, y, 5, 12);
      }
      ctx.fillStyle = isNight ? '#1e3d2a' : '#27ae60';
      ctx.fillRect(0, 0, 8, CH);
      ctx.fillRect(CW - 8, 0, 8, CH);

      const barrierOffset = (roadOffset * 0.5) % 40;
      ctx.fillStyle = isNight ? '#5d6d7e' : '#7f8c8d';
      ctx.strokeStyle = isNight ? '#4a5a6a' : '#5d6d7e';
      ctx.lineWidth = 2;
      for (let y = -barrierOffset; y < CH + 60; y += 40) {
        ctx.fillRect(4, y, 6, 28);
        ctx.strokeRect(4, y, 6, 28);
        ctx.fillRect(CW - 10, y, 6, 28);
        ctx.strokeRect(CW - 10, y, 6, 28);
      }
      ctx.fillStyle = isNight ? '#6c7a89' : '#95a5a6';
      ctx.fillRect(0, 0, 4, CH);
      ctx.fillRect(CW - 4, 0, 4, CH);
    }

    function updateDecorations() {
      if (gameState !== STATE.PLAYING) return;
      while (lastDecorationY < roadOffset + CH + 200) {
        lastDecorationY += 80 + Math.random() * 180;
        const type = Math.random() < 0.55 ? 'flower' : 'tree';
        const side = Math.random() < 0.5 ? 0 : 1;
        decorations.push({ worldY: lastDecorationY, type, side });
      }
      for (let i = decorations.length - 1; i >= 0; i--) {
        if (decorations[i].worldY - roadOffset < -120) decorations.splice(i, 1);
      }
    }

    function drawDecorations() {
      if (isNight) ctx.globalAlpha = 0.65;
      decorations.forEach(d => {
        const screenY = d.worldY - roadOffset;
        if (screenY < -80 || screenY > CH + 80) return;
        if (d.type === 'flower') {
          const x = d.side === 0 ? 18 + (d.worldY % 15) : CW - 18 - (d.worldY % 15);
          ctx.fillStyle = ['#e74c3c', '#f39c12', '#9b59b6', '#e91e63'][Math.floor(d.worldY / 50) % 4];
          ctx.beginPath();
          ctx.arc(x, screenY, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#f1c40f';
          ctx.beginPath();
          ctx.arc(x, screenY, 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#27ae60';
          ctx.fillRect(x - 1, screenY, 2, 12);
        } else {
          const x = d.side === 0 ? 22 : CW - 22;
          ctx.fillStyle = '#1e5c2e';
          ctx.beginPath();
          ctx.moveTo(x, screenY + 25);
          ctx.lineTo(x - 12, screenY + 8);
          ctx.lineTo(x - 4, screenY - 5);
          ctx.lineTo(x + 4, screenY - 8);
          ctx.lineTo(x + 12, screenY + 5);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = '#0d3d1a';
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.fillStyle = '#5d4037';
          ctx.fillRect(x - 3, screenY + 22, 6, 18);
        }
      });
      if (isNight) ctx.globalAlpha = 1;
    }

    function drawCarShadow(x, y, w, h) {
      ctx.save();
      ctx.translate(x, y + 4);
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.beginPath();
      ctx.ellipse(0, 0, w/2 + 4, h/6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

      const x = player.x;

        ctx.fillStyle = glow;
        ctx.fillRect(-33, -h/2 - 8, 36, 32);
        const glow2 = ctx.createRadialGradient(15, -h/2 + 16, 0, 15, -h/2 + 16, 18);
        glow2.addColorStop(0, 'rgba(255,250,205,0.9)');
        glow2.addColorStop(0.4, 'rgba(255,235,150,0.4)');

        ctx.fillStyle = glow2;
        ctx.fillRect(-3, -h/2 - 8, 36, 32);
      }
      ctx.fillStyle = isNight ? '#fffacd' : '#f1c40f';
      ctx.beginPath();
      ctx.ellipse(-15, -h/2 + 16, 6, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#d4ac0d';

      ctx.fillStyle = '#2c3e50';
      ctx.fillRect(-w/2 + 4, h/2 - 22, 14, 14);
      ctx.fillRect(w/2 - 18, h/2 - 22, 14, 14);

      ctx.fillRect(-w/2 + 6, h/2 - 20, 10, 10);
      ctx.fillRect(w/2 - 16, h/2 - 20, 10, 10);

      ctx.fillStyle = 'rgba(231,76,60,0.6)';

      ctx.fillRect(w/2 - 7, h/2 - 6, 4, 6);

      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-w/2 + 2, 0);
      ctx.lineTo(w/2 - 2, 0);
      ctx.stroke();

      ctx.globalAlpha = 1;
      ctx.restore();
    }

    function drawTrafficCar(t) {
      drawCarShadow(t.x, t.y, t.w, t.h);

      ctx.save();
      ctx.translate(t.x, t.y);

      const bodyGrad = ctx.createLinearGradient(-t.w/2, -t.h/2, t.w/2, t.h/2);
      bodyGrad.addColorStop(0, lightenColor(t.color, 30));
      bodyGrad.addColorStop(0.5, t.color);
      bodyGrad.addColorStop(1, darkenColor(t.color, 25));
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.roundRect(-t.w/2, -t.h/2, t.w, t.h, 5);
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.4)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.beginPath();
      ctx.roundRect(-t.w/2 + 5, -t.h/2 + 6, t.w - 10, t.isTruck ? 26 : 22, 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fillRect(-t.w/2 + 8, -t.h/2 + 10, 6, 8);

      if (isNight) {
        const glow = ctx.createRadialGradient(-t.w/2 + 12, -t.h/2 + 14, 0, -t.w/2 + 12, -t.h/2 + 14, 14);
        glow.addColorStop(0, 'rgba(255,248,220,0.85)');
        glow.addColorStop(0.5, 'rgba(255,235,150,0.3)');
        glow.addColorStop(1, 'rgba(255,220,100,0)');
        ctx.fillStyle = glow;
        ctx.fillRect(-t.w/2 - 6, -t.h/2 - 4, 28, 24);
        const glow2 = ctx.createRadialGradient(t.w/2 - 12, -t.h/2 + 14, 0, t.w/2 - 12, -t.h/2 + 14, 14);
        glow2.addColorStop(0, 'rgba(255,248,220,0.85)');
        glow2.addColorStop(0.5, 'rgba(255,235,150,0.3)');
        glow2.addColorStop(1, 'rgba(255,220,100,0)');
        ctx.fillStyle = glow2;
        ctx.fillRect(t.w/2 - 22, -t.h/2 - 4, 28, 24);
      }
      ctx.fillStyle = isNight ? '#fff8dc' : '#f1c40f';
      ctx.beginPath();
      ctx.ellipse(-t.w/2 + 12, -t.h/2 + 14, 4, 3.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(t.w/2 - 12, -t.h/2 + 14, 4, 3.5, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#2c3e50';
      ctx.fillRect(-t.w/2 + 4, t.h/2 - 18, 12, 12);
      ctx.fillRect(t.w/2 - 16, t.h/2 - 18, 12, 12);

      if (t.isTruck) {
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fillRect(-t.w/2 + 4, -t.h/2 + 2, t.w - 8, 14);
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(-t.w/2 + 8, -t.h/2 + 5, 10, 6);
      }

      ctx.fillStyle = darkenColor(t.color, 40);
      ctx.fillRect(-t.w/2 + 2, t.h/2 - 5, 3, 5);
      ctx.fillRect(t.w/2 - 5, t.h/2 - 5, 3, 5);

      ctx.restore();
    }

    function lightenColor(hex, pct) {
      const num = parseInt(hex.slice(1), 16);
      const r = Math.min(255, ((num >> 16) & 0xff) + pct);
      const g = Math.min(255, ((num >> 8) & 0xff) + pct);
      const b = Math.min(255, (num & 0xff) + pct);
      return 'rgb(' + r + ',' + g + ',' + b + ')';
    }
    function darkenColor(hex, pct) {
      const num = parseInt(hex.slice(1), 16);
      const r = Math.max(0, ((num >> 16) & 0xff) - pct);
      const g = Math.max(0, ((num >> 8) & 0xff) - pct);
      const b = Math.max(0, (num & 0xff) - pct);
      return 'rgb(' + r + ',' + g + ',' + b + ')';
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      });
    }

    function drawFloatingTexts() {
      floatingTexts.forEach(f => {
        ctx.globalAlpha = f.life;
        ctx.fillStyle = f.color;
        ctx.font = 'bold 16px Rajdhani, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(f.text, f.x, f.y);
        ctx.globalAlpha = 1;
      });
    }

      ctx.roundRect(12, 12, 152, 62, 10);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,217,61,0.35)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      ctx.fillStyle = '#ffd93d';
      ctx.font = 'bold 16px Orbitron, sans-serif';

      ctx.fillText('PUAN', 24, 32);
      ctx.fillStyle = '#ecf0f1';
      ctx.font = 'bold 20px Orbitron, sans-serif';
      ctx.fillText(String(player.score), 24, 52);
      ctx.fillStyle = '#95a5a6';
      ctx.font = '12px Rajdhani, sans-serif';
      ctx.fillText(speedKmh + ' km/h  ·  Rekor: ' + highScore, 24, 68);
      if (nearMissFlash > 0) {
        nearMissFlash--;
        ctx.fillStyle = '#27ae60';

      }

      if (gameState === STATE.PLAYING) {
        ctx.fillStyle = 'rgba(15,20,28,0.75)';

        ctx.roundRect(CW - 94, 12, 82, 34, 8);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.12)';
        ctx.stroke();
        ctx.fillStyle = '#7f8c8d';
        ctx.font = '11px Rajdhani, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('P  Duraklat', CW - 53, 30);
      }

      if (gameState === STATE.PLAYING) {
        ctx.fillStyle = isNight ? 'rgba(255,248,220,0.7)' : 'rgba(52,73,94,0.8)';
        ctx.font = '12px Rajdhani, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(isNight ? 'Gece' : 'Gündüz', CW - 18, CH - 28);
      }
      if (gameState === STATE.PLAYING) {
        ctx.fillStyle = 'rgba(52,152,219,0.9)';
        ctx.font = 'bold 13px Orbitron, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText('Seviye ' + currentLevel + '  ·  ' + player.score + ' / ' + levelTargetScore, CW - 18, CH - 32);
        const prog = Math.min(1, player.score / levelTargetScore);
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fillRect(14, CH - 22, 152, 10);
        ctx.fillStyle = prog >= 1 ? '#27ae60' : '#3498db';
        ctx.fillRect(14, CH - 22, 152 * prog, 10);
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1;
        ctx.strokeRect(14, CH - 22, 152, 10);
      }
      if (difficultyLevel > 0 && gameState === STATE.PLAYING) {
        ctx.fillStyle = 'rgba(231,76,60,0.25)';
        ctx.font = '11px Rajdhani, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText('Zorluk ' + difficultyLevel, CW - 18, CH - 12);
      }

      const speedNorm = (player.speed - MIN_SPEED) / (MAX_SPEED - MIN_SPEED);
      const gaugeX = CW - 52;
      const gaugeY = 52;
      ctx.save();
      ctx.translate(gaugeX, gaugeY);
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(0, 0, 22, -Math.PI * 0.75, Math.PI * 0.75);
      ctx.stroke();
      ctx.strokeStyle = speedNorm > 0.8 ? '#e74c3c' : speedNorm > 0.5 ? '#f1c40f' : '#27ae60';
      ctx.beginPath();
      ctx.arc(0, 0, 22, -Math.PI * 0.75, -Math.PI * 0.75 + Math.PI * 1.5 * speedNorm);
      ctx.stroke();
      ctx.fillStyle = '#ecf0f1';
      ctx.font = '10px Orbitron, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(Math.min(999, Math.floor(player.speed * 22)), 0, 5);
      ctx.restore();
    }

    function drawMenu() {
      ctx.fillStyle = 'rgba(0,0,0,0.88)';
      ctx.fillRect(0, 0, CW, CH);
      ctx.fillStyle = '#ffd93d';
      ctx.font = 'bold 32px Orbitron, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('3 ŞERİT KAÇIŞ', CW/2, 95);
      ctx.font = '14px Rajdhani, sans-serif';
      ctx.fillStyle = '#bdc3c7';
      ctx.fillText('↑↓ Seviye seç  ·  Enter Başlat', CW/2, 128);

      const boxW = 320;
      const boxH = 42;
      const startY = 155;
      LEVELS.forEach((lev, i) => {
        const y = startY + i * (boxH + 6);
        const unlocked = (i + 1) <= unlockedLevel;
        const selected = i === menuSelectedLevel;
        ctx.fillStyle = selected ? 'rgba(255,217,61,0.2)' : 'rgba(255,255,255,0.06)';
        ctx.strokeStyle = selected ? '#ffd93d' : unlocked ? 'rgba(255,255,255,0.25)' : 'rgba(100,100,100,0.4)';
        ctx.lineWidth = selected ? 2.5 : 1;
        ctx.beginPath();
        ctx.roundRect(CW/2 - boxW/2, y - boxH/2, boxW, boxH, 8);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = unlocked ? (selected ? '#ffd93d' : '#ecf0f1') : '#5d6d7e';
        ctx.font = selected ? 'bold 18px Orbitron, sans-serif' : '17px Rajdhani, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('Seviye ' + (i + 1) + ' – ' + lev.name, CW/2 - boxW/2 + 14, y + 5);
        ctx.font = '13px Rajdhani, sans-serif';
        ctx.fillStyle = unlocked ? '#7f8c8d' : '#4a5568';
        ctx.textAlign = 'right';
        if (unlocked) ctx.fillText('Hedef: ' + lev.targetScore + ' puan', CW/2 + boxW/2 - 14, y + 5);
        else ctx.fillText('Kilitli', CW/2 + boxW/2 - 14, y + 5);
      });

      ctx.fillStyle = '#27ae60';
      ctx.font = 'bold 18px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Rekor: ' + highScore + '  ·  Açık seviye: ' + unlockedLevel + '/' + LEVELS.length, CW/2, 400);
      ctx.fillStyle = '#95a5a6';
      ctx.font = '14px sans-serif';
      ctx.fillText('S = İstatistikler  ·  H = Yardım  ·  Esc = Çıkış', CW/2, 435);
    }

    function drawStats() {
      const totalNearMiss = parseInt(localStorage.getItem('laneRunnerNearMiss') || '0');
      ctx.fillStyle = 'rgba(0,0,0,0.9)';
      ctx.fillRect(0, 0, CW, CH);
      ctx.fillStyle = '#ffd93d';
      ctx.font = 'bold 28px Orbitron, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('İSTATİSTİKLER', CW/2, 80);
      ctx.strokeStyle = 'rgba(255,217,61,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(40, 100);
      ctx.lineTo(CW - 40, 100);
      ctx.stroke();
      ctx.fillStyle = '#ecf0f1';
      ctx.font = '20px Rajdhani, sans-serif';
      ctx.textAlign = 'left';
      const left = 50;
      let row = 150;
      ctx.fillText('En yüksek puan: ' + highScore, left, row);
      row += 38;
      ctx.fillText('Toplam oyun: ' + totalGames, left, row);
      row += 38;
      ctx.fillText('Toplam yakın kaçış: ' + totalNearMiss, left, row);
      row += 50;
      ctx.fillStyle = '#7f8c8d';
      ctx.font = '16px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Esc veya Backspace = Menüye dön', CW/2, CH - 50);
    }

    function drawHelp() {
      ctx.fillStyle = 'rgba(0,0,0,0.92)';
      ctx.fillRect(0, 0, CW, CH);
      ctx.fillStyle = '#ffd93d';
      ctx.font = 'bold 26px Orbitron, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('NASIL OYNANIR', CW/2, 70);
      ctx.strokeStyle = 'rgba(255,217,61,0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(35, 90);
      ctx.lineTo(CW - 35, 90);
      ctx.stroke();
      ctx.fillStyle = '#ecf0f1';
      ctx.font = '17px Rajdhani, sans-serif';
      ctx.textAlign = 'left';
      const lines = [
        '• Sol ok (←): 1 şerit sola kay',
        '• Sağ ok (→): 1 şerit sağa kay',
        '• Yukarı ok (↑): Hızlan',
        '• Aşağı ok (↓): Yavaşla',
        '• P: Oyunu duraklat',
        '• R: Çarptıktan sonra yeniden başlat',
        '',
        'Önüne çıkan araçlardan şerit değiştirerek kaç. Aynı şeritte çakışırsan oyun biter. Yakın geçişler (yakın kaçış) ekstra sayılır. Süre arttıkça trafik ve zorluk artar.'
      ];
      let y = 125;
      lines.forEach(line => {
        if (line === '') { y += 12; return; }
        ctx.fillText(line, 40, y);
        y += 28;
      });
      ctx.fillStyle = '#27ae60';
      ctx.font = '15px sans-serif';
      ctx.fillText('Menüde S = İstatistikler, H = Bu yardım', 40, y + 25);
      ctx.fillStyle = '#95a5a6';
      ctx.font = '16px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Esc veya Backspace = Menüye dön', CW/2, CH - 45);
    }

    function drawCountdown() {
      const msg = countdown === 4 ? '3' : countdown === 3 ? '2' : countdown === 2 ? '1' : countdown === 1 ? 'GO!' : '';
      if (!msg) return;
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillRect(0, 0, CW, CH);
      ctx.fillStyle = countdown === 1 ? '#27ae60' : '#ffd93d';
      ctx.font = 'bold 110px Orbitron, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(msg, CW/2, CH/2);
    }

    function drawPaused() {
      ctx.fillStyle = 'rgba(0,0,0,0.78)';
      ctx.fillRect(0, 0, CW, CH);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 38px Orbitron, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('DURAKLATILDI', CW/2, CH/2 - 25);
      ctx.font = '18px sans-serif';
      ctx.fillStyle = '#bdc3c7';
      ctx.fillText('P = Devam et', CW/2, CH/2 + 20);
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(0,0,0,0.82)';
      ctx.fillRect(0, 0, CW, CH);
      if (wasNewRecord) {
        ctx.fillStyle = 'rgba(241,196,15,0.9)';
        ctx.font = 'bold 26px Orbitron, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('★ YENİ REKOR! ★', CW/2, CH/2 - 95);
      }
      ctx.fillStyle = '#e74c3c';
      ctx.font = 'bold 42px Orbitron, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('ÇARPIŞMA!', CW/2, CH/2 - 55);
      ctx.fillStyle = '#ffd93d';
      ctx.font = '22px Rajdhani, sans-serif';
      ctx.fillText('Puan: ' + lastRunScore, CW/2, CH/2 - 10);
      ctx.fillStyle = '#27ae60';
      ctx.fillText('Rekor: ' + highScore, CW/2, CH/2 + 28);
      if (lastRunNearMiss > 0) {
        ctx.fillStyle = '#1abc9c';
        ctx.fillText('Yakın kaçış: ' + lastRunNearMiss, CW/2, CH/2 + 58);
      }
      ctx.fillStyle = '#bdc3c7';
      ctx.font = '18px sans-serif';
      ctx.fillText('R - Yeniden Başlat', CW/2, CH/2 + 108);
    }

    function drawLevelComplete() {
      ctx.fillStyle = 'rgba(0,0,0,0.85)';
      ctx.fillRect(0, 0, CW, CH);
      ctx.fillStyle = '#27ae60';
      ctx.font = 'bold 28px Orbitron, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('★ SEVİYE TAMAMLANDI ★', CW/2, CH/2 - 100);
      ctx.fillStyle = '#ffd93d';
      ctx.font = 'bold 22px Rajdhani, sans-serif';
      ctx.fillText(LEVELS[currentLevel - 1].name, CW/2, CH/2 - 65);
      ctx.fillStyle = '#ecf0f1';
      ctx.font = '20px Rajdhani, sans-serif';
      ctx.fillText('Puan: ' + lastRunScore + ' / ' + levelTargetScore, CW/2, CH/2 - 25);
      if (lastRunNearMiss > 0) {
        ctx.fillStyle = '#1abc9c';
        ctx.fillText('Yakın kaçış: ' + lastRunNearMiss, CW/2, CH/2 + 10);
      }
      const hasNext = currentLevel < LEVELS.length && currentLevel + 1 <= unlockedLevel;
      ctx.fillStyle = hasNext ? '#f1c40f' : '#95a5a6';
      ctx.font = 'bold 18px sans-serif';
      ctx.fillText(hasNext ? 'Enter – Sonraki seviye' : 'Enter – Menüye dön', CW/2, CH/2 + 55);
      ctx.fillStyle = '#7f8c8d';
      ctx.font = '15px sans-serif';
      ctx.fillText('Esc – Menü', CW/2, CH/2 + 88);
    }

    function updateCountdown() {
      if (gameState !== STATE.COUNTDOWN) return;
      countdownTimer++;
      if (countdownTimer >= 42) {
        countdown--;
        countdownTimer = 0;
        if (countdown >= 1 && countdown <= 3) playCountdownBeep();
        if (countdown === 1) playGo();
        if (countdown <= 0) {
          gameState = STATE.PLAYING;
          player.invincibleFrames = 90;
        }
      }
    }

    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        this.beginPath();
        this.moveTo(x + r, y);
        this.lineTo(x + w - r, y);
        this.quadraticCurveTo(x + w, y, x + w, y + r);
        this.lineTo(x + w, y + h - r);
        this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        this.lineTo(x + r, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - r);
        this.lineTo(x, y + r);
        this.quadraticCurveTo(x, y, x + r, y);
        this.closePath();
      };
    }

    function draw() {
      ctx.save();
      let sx = 0, sy = 0;
      if (screenShake > 0) {
        sx = (Math.random() - 0.5) * screenShake;
        sy = (Math.random() - 0.5) * screenShake;
        screenShake -= 2;
      }
      ctx.translate(sx, sy);

      drawRoad();
      drawDecorations();
      traffic.forEach(t => drawTrafficCar(t));
      drawPlayerCar();
      drawParticles();
      drawFloatingTexts();
      drawHUD();

      if (gameState === STATE.MENU) drawMenu();
      if (gameState === STATE.STATS) drawStats();
      if (gameState === STATE.HELP) drawHelp();
      if (gameState === STATE.COUNTDOWN) drawCountdown();
      if (gameState === STATE.PAUSED) drawPaused();
      if (gameState === STATE.GAME_OVER) drawGameOver();
      if (gameState === STATE.LEVEL_COMPLETE) drawLevelComplete();

      ctx.restore();
    }

    function gameLoop() {
      updateCountdown();
      if (gameState === STATE.PLAYING) {
        updatePlayer();
        spawnTraffic();
        updateTraffic();
        checkCollision();
        updateDecorations();
        updateParticles();
        updateFloatingTexts();
      }
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
